spring.application.name=chasis
# =========================
# SERVER CONFIG
# =========================
server.port=8081

server.address=0.0.0.0

# =========================
# POSTGRESQL CONFIG
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5432/chasisdb
spring.datasource.username=postgres
spring.datasource.password=Nerry987
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA CONFIG
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# =========================
# JWT CONFIG
# =========================
#app.jwtSecret=secretKeyForChasisNumberSystemThatIsLongEnoughForHS256AlgorithmForJWT
#app.jwtExpirationMs=604800000

# =========================
# LOGGING CONFIG
# =========================
logging.level.root=INFO
logging.level.com.vehicle.chasis=DEBUG
logging.level.org.springframework.security=DEBUG
